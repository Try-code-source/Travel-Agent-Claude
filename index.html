<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SAM – Travel Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; } 

    body {
      min-height: 100vh;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      padding: 16px;
    }

    #chat-container {
      width: 100%;
      max-width: 680px;
      background: #ffffff;
      border-radius: 24px;
      border: 1px solid #d0e4f0;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      height: 85vh;
      overflow: hidden;
    }

    /* Header */
    #chat-header {
      background: linear-gradient(90deg, #5bc8f5, #1a91d1);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #header-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    #header-name { color: #fff; font-weight: 700; font-size: 18px; }
    #header-sub  { color: rgba(255,255,255,0.8); font-size: 13px; }
    #header-status { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; }
    #status-label { color: rgba(255,255,255,0.85); font-size: 12px; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: #b0d4e8 transparent;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #b0d4e8; border-radius: 2px; }

    .msg-row { display: flex; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5bc8f5, #1a91d1);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      margin-right: 8px;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .msg-bubble {
      max-width: 75%;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.6;
    }
